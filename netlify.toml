# Netlify build configuration for a Vite + React SPA.
# See https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page-app fallback: every unknown path serves index.html so
# react-router can handle client-side routes like /about and /contact.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-lived caching for hashed assets produced by Vite.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
